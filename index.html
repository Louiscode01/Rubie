    image-slot::part(empty) {
      color: rgba(60,52,40,0.78);
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      font-size: 12px;
      letter-spacing: 0.05em;
    }

    @keyframes panelSlideUp {
      from { transform: translateY(100%); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    @keyframes labelFadeIn {
      from { opacity: 0; transform: translate(-50%, -90%); }
      to   { opacity: 1; transform: translate(-50%, -100%); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Loading splash */
    .splash {
      position: fixed; inset: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 18px;
      background: #efe9df; color: #1a1714;
      animation: fadeIn .3s ease;
      transition: opacity .6s ease;
      pointer-events: none;
    }
    .splash.hidden { opacity: 0; }
    .splash-title {
      font-family: 'Cormorant Garamond', 'Noto Serif SC', serif;
      font-size: 32px; font-weight: 400; letter-spacing: -.01em;
    }
    .splash-sub {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      font-size: 10px; letter-spacing: .3em; text-transform: uppercase;
      opacity: .5;
    }
    .splash-bar {
      width: 80px; height: 1px; background: rgba(26,23,20,.25);
      position: relative; overflow: hidden;
    }
    .splash-bar::after {
      content: ''; position: absolute; left: -40%; top: 0; width: 40%; height: 100%;
      background: #a53a2c; animation: barSlide 1.2s ease-in-out infinite;
    }
    @keyframes barSlide {
      0%   { left: -40%; }
      100% { left: 100%; }
    }

    body.scene-ready .splash { opacity: 0; }

    /* Honor the visitor's reduced-motion preference: neutralize CSS
       transitions/animations. The 3D scene's own motion is handled in JS. */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
        scroll-behavior: auto !important;
      }
    }

  <script>
    // Hide the splash once the scene's canvas exists. If it never appears
    // (no WebGL, a CDN script failed, an init error) fall back to a readable
    // message instead of spinning on the loading screen forever.
    (function () {
      var DEADLINE = 20000; // ms before giving up
      var startedAt = Date.now();
      var checkReady = function () {
        var canvas = document.querySelector(".scene-container canvas");
        if (canvas) {
          document.body.classList.add("scene-ready");
          setTimeout(function () {
            var s = document.getElementById("splash");
            if (s) s.style.display = "none";
          }, 700);
          return;
        }
        if (Date.now() - startedAt > DEADLINE) {
          var s = document.getElementById("splash");
          if (s) {
            s.innerHTML =
              '<div class="splash-title">Rubie Yu</div>' +
              '<div class="splash-sub" style="opacity:.75;letter-spacing:.04em;' +
              'text-transform:none;max-width:320px;text-align:center;line-height:1.7">' +
              '这座园林需要 WebGL 与网络连接。请检查网络后刷新，' +
              '或换用支持 WebGL 的现代浏览器。<br><br>' +
              'This garden needs WebGL and a network connection. Please check ' +
              'your connection and refresh, or try a modern browser with WebGL ' +
              'enabled.</div>';
          }
          return;
        }
        setTimeout(checkReady, 100);
      };
